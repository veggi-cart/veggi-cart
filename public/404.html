<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Genzy Basket</title>
    <meta name="description" content="The page you're looking for doesn't exist. Visit Genzy Basket to order fresh groceries and daily essentials online." />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://genzybasket.com/" />
    <script>
      // Single Page App redirect for GitHub Pages
      // Converts the path into a query string so index.html can restore it
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <noscript>
      <div style="max-width:600px;margin:0 auto;padding:40px 20px;font-family:system-ui,sans-serif;text-align:center">
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist.</p>
        <p><a href="https://genzybasket.com/">Go to Genzy Basket Homepage</a></p>
      </div>
    </noscript>
  </body>
</html>
